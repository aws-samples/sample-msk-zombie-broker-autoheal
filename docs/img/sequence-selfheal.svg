<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="'Segoe UI',system-ui,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="c" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#2997ff"/></marker>
    <marker id="r" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#8b95a7"/></marker>
    <marker id="p" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#bf5af2"/></marker>
    <marker id="gr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#30d158"/></marker>
  </defs>
  <rect width="960" height="700" rx="14" fill="#0f1622"/>
  <text x="40" y="42" fill="#f5f5f7" font-size="22" font-weight="700">Self-heal loop — sequence (as validated on a live MSK cluster)</text>
  <text x="40" y="67" fill="#8b95a7" font-size="13.5">one EventBridge tick → detect by symptom → guardrails → RebootBroker → ZooKeeper fences → leader re-elected</text>

  <!-- lifelines -->
  <g text-anchor="middle" font-size="12.5" font-weight="700">
    <rect x="34"  y="86" width="100" height="38" rx="8" fill="#1e2a3d" stroke="#ff9900"/><text x="84"  y="110" fill="#fbbf24">EventBridge</text>
    <rect x="186" y="86" width="100" height="38" rx="8" fill="#10233b" stroke="#2997ff"/><text x="236" y="110" fill="#7dd3fc">Lambda</text>
    <rect x="346" y="86" width="100" height="38" rx="8" fill="#1e2a3d" stroke="#2997ff"/><text x="396" y="110" fill="#7dd3fc">CloudWatch</text>
    <rect x="506" y="86" width="100" height="38" rx="8" fill="#1e2a3d" stroke="#30d158"/><text x="556" y="110" fill="#86efac">DynamoDB</text>
    <rect x="660" y="86" width="100" height="38" rx="8" fill="#2a1418" stroke="#ff453a"/><text x="710" y="110" fill="#ff8a80">MSK broker</text>
    <rect x="812" y="86" width="114" height="38" rx="8" fill="#231233" stroke="#bf5af2"/><text x="869" y="110" fill="#d8b4fe">ZK / controller</text>
  </g>
  <g stroke="#33415a" stroke-width="1.3" stroke-dasharray="4,4">
    <line x1="84"  y1="124" x2="84"  y2="662"/>
    <line x1="236" y1="124" x2="236" y2="662"/>
    <line x1="396" y1="124" x2="396" y2="662"/>
    <line x1="556" y1="124" x2="556" y2="662"/>
    <line x1="710" y1="124" x2="710" y2="662"/>
    <line x1="869" y1="124" x2="869" y2="662"/>
  </g>
  <!-- activation on Lambda -->
  <rect x="230" y="172" width="12" height="404" fill="#10233b" stroke="#2997ff" stroke-width="1"/>

  <!-- helper: message labels have a bg rect -->
  <!-- m1 -->
  <line x1="84" y1="186" x2="228" y2="186" stroke="#2997ff" stroke-width="1.8" marker-end="url(#c)"/>
  <rect x="92" y="172" width="132" height="16" fill="#0f1622"/><text x="158" y="184" fill="#cbd5e1" font-size="11.5" text-anchor="middle">1 · trigger · rate(1 min)</text>

  <!-- m2 -->
  <line x1="242" y1="222" x2="394" y2="222" stroke="#2997ff" stroke-width="1.8" marker-end="url(#c)"/>
  <rect x="248" y="208" width="180" height="16" fill="#0f1622"/><text x="338" y="220" fill="#cbd5e1" font-size="11.5" text-anchor="middle">2 · GetMetricData (per-broker)</text>

  <!-- m3 return -->
  <line x1="394" y1="252" x2="244" y2="252" stroke="#8b95a7" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#r)"/>
  <rect x="250" y="238" width="190" height="16" fill="#0f1622"/><text x="345" y="250" fill="#86efac" font-size="11.5" text-anchor="middle">3 · BytesIn=0 + URP&gt;0 ⇒ zombie</text>

  <!-- alt frame -->
  <rect x="196" y="276" width="540" height="222" rx="6" fill="none" stroke="#fbbf24" stroke-width="1.3"/>
  <path d="M196,276 h54 v18 l-10,8 h-44 z" fill="#1e2a3d" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="206" y="291" fill="#fbbf24" font-size="11" font-weight="700">alt</text>
  <rect x="256" y="280" width="470" height="15" fill="#0f1622"/><text x="262" y="291" fill="#8b95a7" font-size="11">[guardrails pass: 1 broker · not in cooldown · under daily cap]</text>

  <!-- m4 -->
  <line x1="242" y1="322" x2="554" y2="322" stroke="#30d158" stroke-width="1.7" marker-end="url(#gr)"/>
  <rect x="300" y="308" width="190" height="16" fill="#0f1622"/><text x="395" y="320" fill="#cbd5e1" font-size="11.5" text-anchor="middle">4 · record cooldown / cap state</text>

  <!-- m5 return -->
  <line x1="554" y1="352" x2="244" y2="352" stroke="#8b95a7" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#r)"/>
  <rect x="380" y="338" width="60" height="16" fill="#0f1622"/><text x="410" y="350" fill="#86efac" font-size="11.5" text-anchor="middle">5 · ok</text>

  <!-- m6 reboot -->
  <line x1="242" y1="392" x2="708" y2="392" stroke="#bf5af2" stroke-width="2" marker-end="url(#p)"/>
  <rect x="380" y="378" width="200" height="16" fill="#0f1622"/><text x="480" y="390" fill="#d8b4fe" font-size="11.5" text-anchor="middle">6 · kafka:RebootBroker(brokerId)</text>

  <!-- m7 return -->
  <line x1="708" y1="422" x2="244" y2="422" stroke="#8b95a7" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#r)"/>
  <rect x="400" y="408" width="180" height="16" fill="#0f1622"/><text x="490" y="420" fill="#cbd5e1" font-size="11.5" text-anchor="middle">7 · ClusterOperationArn</text>

  <!-- self note: SNS -->
  <rect x="250" y="442" width="220" height="44" rx="6" fill="#13202e" stroke="#1e2a3d"/>
  <text x="360" y="461" fill="#cbd5e1" font-size="11.5" text-anchor="middle">8 · SNS alert: "rebooted</text>
  <text x="360" y="477" fill="#cbd5e1" font-size="11.5" text-anchor="middle">zombie broker N"</text>

  <!-- m8 reboot drops ZK session -->
  <line x1="710" y1="524" x2="867" y2="524" stroke="#ff453a" stroke-width="1.8" marker-end="url(#r)"/>
  <rect x="700" y="510" width="180" height="16" fill="#0f1622"/><text x="790" y="522" fill="#ff8a80" font-size="11.5" text-anchor="middle">9 · reboot drops ZK session</text>

  <!-- m9 fence + elect -->
  <line x1="867" y1="556" x2="712" y2="556" stroke="#30d158" stroke-width="1.9" marker-end="url(#gr)"/>
  <rect x="690" y="542" width="200" height="16" fill="#0f1622"/><text x="790" y="554" fill="#86efac" font-size="11.5" text-anchor="middle">10 · fence + elect new leader</text>

  <!-- recovered banner -->
  <rect x="150" y="592" width="660" height="40" rx="10" fill="#10261a" stroke="#30d158" stroke-width="1.8"/>
  <text x="480" y="617" fill="#bbf7d0" font-size="14" font-weight="700" text-anchor="middle">SERVICE RECOVERED — minutes, single broker, no migration</text>

  <text x="480" y="660" fill="#8b95a7" font-size="11.5" text-anchor="middle">next tick: BytesIn&gt;0, URP=0 → action = none (zero false positive); if still zombie after cooldown → escalate node replacement</text>
</svg>
