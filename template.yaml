AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  msk-zombie-broker-autoheal — IaC alternative to deploy.sh.
  Poll-based self-heal for the MSK app-log volume blind spot: a scheduled Lambda
  scans all brokers, detects a "zombie" (BytesInPerSec=0 + cluster URP>0) and,
  within guardrails, issues kafka:RebootBroker. Deploy with AWS SAM:
    sam build && sam deploy --guided

Parameters:
  ClusterArn:    { Type: String, Description: MSK cluster ARN }
  ClusterName:   { Type: String, Description: MSK cluster name (CloudWatch dimension) }
  CooldownS:     { Type: Number, Default: 600, Description: Per-broker reboot cooldown (s) }
  DailyCap:      { Type: Number, Default: 4,   Description: Max reboots / cluster / day }
  DetectWindowMin: { Type: Number, Default: 3, Description: Detection window (minutes) }
  DryRun:        { Type: String, Default: 'false', AllowedValues: ['true','false'],
                   Description: 'true = observe-only (detect+notify, never reboot)' }
  NotifyEmail:   { Type: String, Default: '', Description: Optional email for alerts }

Conditions:
  HasEmail: !Not [!Equals [!Ref NotifyEmail, '']]
  IsDryRun: !Equals [!Ref DryRun, 'true']

Resources:
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-alerts'

  AlertsEmailSub:
    Type: AWS::SNS::Subscription
    Condition: HasEmail
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: !Ref NotifyEmail

  StateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-state'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: clusterArn, AttributeType: S }
        - { AttributeName: brokerSk,   AttributeType: S }
      KeySchema:
        - { AttributeName: clusterArn, KeyType: HASH }
        - { AttributeName: brokerSk,   KeyType: RANGE }
      TimeToLiveSpecification: { AttributeName: ttl, Enabled: true }

  SelfHealFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-fn'
      CodeUri: .
      Handler: selfheal_lambda.handler
      Runtime: python3.12
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          CLUSTER_ARN: !Ref ClusterArn
          CLUSTER_NAME: !Ref ClusterName
          REGION: !Ref AWS::Region
          STATE_TABLE: !Ref StateTable
          SNS_TOPIC_ARN: !Ref AlertsTopic
          COOLDOWN_S: !Ref CooldownS
          DAILY_CAP: !Ref DailyCap
          DETECT_WINDOW_MIN: !Ref DetectWindowMin
          DRY_RUN: !Ref DryRun
      Policies:
        - Statement:
            - Sid: DescribeAndReboot
              Effect: Allow
              Action: [kafka:DescribeCluster, kafka:RebootBroker]
              Resource: !Ref ClusterArn
            - Sid: ReadMetrics
              Effect: Allow
              Action: [cloudwatch:GetMetricData]
              Resource: '*'
            - Sid: State
              Effect: Allow
              Action: [dynamodb:GetItem, dynamodb:PutItem]
              Resource: !GetAtt StateTable.Arn
            - Sid: Notify
              Effect: Allow
              Action: [sns:Publish]
              Resource: !Ref AlertsTopic
      Events:
        EveryMinute:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: Scan MSK for zombie brokers

Outputs:
  FunctionName: { Value: !Ref SelfHealFn }
  AlertsTopicArn: { Value: !Ref AlertsTopic }
  Mode:
    Value: !If [IsDryRun, 'OBSERVE-ONLY', 'LIVE self-heal']
