# =============================================================================
# L0 — Producer hardening (contain the blast radius; zero migration)
# =============================================================================
# The amplifier (Defect C): with a small send buffer + few retries + acks=1, a
# single stuck/zombie broker fills the producer buffer and blocks writes to
# HEALTHY partitions too — turning a one-broker stall into a cluster-wide outage.
# Hardening below keeps the blast radius to the affected broker only.
#
# Real evidence: raising one customer's buffer from ~1MB toward 32MB+ cut the
# producer-side impact of a single zombie broker from ~100% to ~37%.
#
# Apply these to every producer client, then redeploy the apps.

# --- keep the buffer big enough that one stuck partition can't starve others ---
buffer.memory=67108864            # >= 64 MB

# --- retry hard, but bounded, so a transient stall doesn't surface as data loss ---
retries=2147483647                # effectively MAX; bounded by delivery.timeout.ms
delivery.timeout.ms=120000        # total time a record may take before failing
max.block.ms=10000                # fail fast when the buffer is full (don't hang forever)
request.timeout.ms=30000
retry.backoff.ms=100

# --- durability: never ack until the data is on the in-sync replicas ---
acks=all
enable.idempotence=true           # safe retries, no duplicates (Kafka >= 0.11)

# --- spread load / recover faster across partitions ---
max.in.flight.requests.per.connection=5   # <=5 keeps ordering with idempotence

# Topic / cluster side (set via kafka-configs or at topic creation), see audit-topics.sh:
#   replication.factor = 3            (across 3 AZs)
#   min.insync.replicas = 2           (with acks=all => tolerate 1 broker down)
